name: finer
description: "FINER — AI Financial Assistant. Smart personal finance, tax help, legal advice."
version: 1.0.0+1
publish_to: "none"

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.69.0
  smooth_page_indicator: ^1.2.0

  # State management
  provider: ^6.1.2

  # Local storage
  shared_preferences: ^2.3.1
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  path_provider: ^2.1.4

  # HTTP
  http: ^1.2.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
